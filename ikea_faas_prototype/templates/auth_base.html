<html lang="da">
<head>

    <title>{% block title %}IKEA{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/ikea-style.css') }}">

<body class="ikea-style {% block body_class %}{% endblock %}">

</html>
